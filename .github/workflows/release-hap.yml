name: Release HAP

on:
  # 仅在推送版本标签时触发，避免每次提交都执行发布流程
  push:
    tags:
      - "v*"
  # 允许手动触发，便于补发历史版本资产
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-hap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure HAP exists
        shell: bash
        run: |
          # 这里校验目标文件存在，失败时给出明确错误，避免发布空资产
          HAP_PATH="entry/build/default/outputs/default/entry-default-unsigned.hap"
          if [ ! -f "$HAP_PATH" ]; then
            echo "Missing build artifact: $HAP_PATH"
            echo "Please commit the file first, or build it on CI before release."
            exit 1
          fi

      - name: Upload HAP to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # 如标签已存在 release，则自动更新并重新上传资产（开启覆盖）
          files: entry/build/default/outputs/default/entry-default-unsigned.hap
          fail_on_unmatched_files: true
          generate_release_notes: true
          overwrite_files: true
